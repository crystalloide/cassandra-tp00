storageType: cassandra
cassandra:
  type: basic
  contactPoints:
    - host: "192.168.100.151"   # cassandra01 — DC Nord  ✓
      port: 9042
    - host: "192.168.100.153"   # cassandra03 — DC Nord  ✓
      port: 9042
    # .152 et .154 (Terres-de-la-Couronne) : seront découverts automatiquement
  sessionKeyspaceName: "reaper_db"
  loadBalancingPolicy:
    type: default
    localDataCenter: Nord

hangingRepairTimeoutMins: 30
incrementalRepair: false
repairIntensity: 0.9
repairParallelism: DATACENTER_AWARE
repairRunThreadCount: 15

autoScheduling:
  enabled: true
  initialDelayPeriod: PT15S
  periodBetweenPolls: PT10M
  timeBeforeFirstSchedule: PT5M
  scheduleSpreadPeriod: PT6H
  adaptive: true

accessControl:
  enabled: false

server:
  applicationConnectors:
    - type: http
      port: 8080
  adminConnectors:
    - type: http
      port: 8081

logging:
  level: INFO
  loggers:
    io.cassandrareaper: DEBUG
    com.datastax.driver: WARN

metrics:
  frequency: 1 minute
  reporters:
    - type: log
      logger: metrics
