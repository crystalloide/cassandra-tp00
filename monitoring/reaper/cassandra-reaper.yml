# Cassandra Reaper Configuration
storageType: cassandra
cassandra:
  type: basic
  contactPoints:
    - host: "192.168.100.151"
      port: 9042
    - host: "192.168.100.152"
      port: 9042
    - host: "192.168.100.153"
      port: 9042
    - host: "192.168.100.154"
      port: 9042
  sessionKeyspaceName: "reaper_db"
  loadBalancingPolicy:
    type: default
    localDataCenter: Nord            # doit correspondre à CASSANDRA_DC

# Required repair settings
hangingRepairTimeoutMins: 30
incrementalRepair: false
repairIntensity: 0.9
repairParallelism: DATACENTER_AWARE
repairRunThreadCount: 15

# JMX Authentication — désactivée car authenticate=false sur les nœuds
# jmxAuth:                           # ← commenté, sinon connexion JMX refusée
#   username: cassandra
#   password: cassandra

# Auto-scheduling
autoScheduling:
  enabled: true
  initialDelayPeriod: PT15S
  periodBetweenPolls: PT10M
  timeBeforeFirstSchedule: PT5M
  scheduleSpreadPeriod: PT6H
  adaptive: true

# Access control
accessControl:
  enabled: false

# Server configuration
server:
  applicationConnectors:
    - type: http
      port: 8080
  adminConnectors:
    - type: http
      port: 8081

# Logging
logging:
  level: INFO
  loggers:
    io.cassandrareaper: DEBUG
    com.datastax.driver: WARN

# Metrics
metrics:
  frequency: 1 minute
  reporters:
    - type: log
      logger: metrics
