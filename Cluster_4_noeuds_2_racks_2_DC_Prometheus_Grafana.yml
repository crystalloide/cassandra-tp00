networks:
  cassandra_network:
    ipam:
      config:
        - subnet: 192.168.100.0/24

# ─────────────────────────────────────────────────────────────
#  CASSANDRA NODES
# ─────────────────────────────────────────────────────────────
services:
  cassandra01:
    image: docker.io/library/cassandra:latest
    hostname: cassandra01
    container_name: cassandra01
    mem_limit: 1g
    cpus: 0.5
    restart: always
    networks:
      cassandra_network:
        ipv4_address: 192.168.100.151
    volumes:
      - ${PWD}/docker/cassandra01:/var/lib/cassandra
      - conf01:/opt/cassandra/conf
    environment:
      - CASSANDRA_CLUSTER_NAME=formation
      - CASSANDRA_SEEDS=cassandra01,cassandra02
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_DC=Nord
      - CASSANDRA_RACK=Winterfell
      - CASSANDRA_BROADCAST_RPC_ADDRESS=192.168.100.151
      - CASSANDRA_NATIVE_TRANSPORT_PORT=9042
      - MAX_HEAP_SIZE=256m
      - HEAP_NEWSIZE=50m
      - LOCAL_JMX=no
      - JVM_EXTRA_OPTS=-Djava.rmi.server.hostname=192.168.100.151 -Dcom.sun.management.jmxremote.authenticate=false
    ports:
      - "7100:7000"
      - "9142:9042"
      - "7199:7199"
      - "8181:8081"
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'Startup complete' /var/log/cassandra/system.log"]
      interval: 15s
      timeout: 10s
      retries: 50
      start_period: 180s

  cassandra02:
    depends_on:
      cassandra01:
        condition: service_healthy
    image: docker.io/library/cassandra:latest
    hostname: cassandra02
    container_name: cassandra02
    mem_limit: 1g
    cpus: 0.5
    restart: always
    networks:
      cassandra_network:
        ipv4_address: 192.168.100.152
    volumes:
      - ${PWD}/docker/cassandra02:/var/lib/cassandra
      - conf02:/opt/cassandra/conf
    environment:
      - CASSANDRA_CLUSTER_NAME=formation
      - CASSANDRA_SEEDS=cassandra01,cassandra02
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_DC=Terres-de-la-Couronne
      - CASSANDRA_RACK=Port-Real
      - CASSANDRA_BROADCAST_RPC_ADDRESS=192.168.100.152
      - CASSANDRA_NATIVE_TRANSPORT_PORT=9042
      - MAX_HEAP_SIZE=256m
      - HEAP_NEWSIZE=50m
      - LOCAL_JMX=no
      - JVM_EXTRA_OPTS=-Djava.rmi.server.hostname=192.168.100.152 -Dcom.sun.management.jmxremote.authenticate=false
    ports:
      - "7200:7000"
      - "9242:9042"
      - "7299:7199"
      - "8281:8081"
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'Startup complete' /var/log/cassandra/system.log"]
      interval: 15s
      timeout: 10s
      retries: 50
      start_period: 180s

  cassandra03:
    depends_on:
      cassandra02:
        condition: service_healthy
    image: docker.io/library/cassandra:latest
    hostname: cassandra03
    container_name: cassandra03
    mem_limit: 1g
    cpus: 0.5
    restart: always
    networks:
      cassandra_network:
        ipv4_address: 192.168.100.153
    volumes:
      - ${PWD}/docker/cassandra03:/var/lib/cassandra
      - conf03:/opt/cassandra/conf
    environment:
      - CASSANDRA_CLUSTER_NAME=formation
      - CASSANDRA_SEEDS=cassandra01,cassandra02
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_DC=Nord
      - CASSANDRA_RACK=Winterfell
      - CASSANDRA_BROADCAST_RPC_ADDRESS=192.168.100.153
      - CASSANDRA_NATIVE_TRANSPORT_PORT=9042
      - MAX_HEAP_SIZE=256m
      - HEAP_NEWSIZE=50m
      - LOCAL_JMX=no
      - JVM_EXTRA_OPTS=-Djava.rmi.server.hostname=192.168.100.153 -Dcom.sun.management.jmxremote.authenticate=false
    ports:
      - "7300:7000"
      - "9342:9042"
      - "7399:7199"
      - "8381:8081"
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'Startup complete' /var/log/cassandra/system.log"]
      interval: 15s
      timeout: 10s
      retries: 50
      start_period: 180s

  cassandra04:
    depends_on:
      cassandra03:
        condition: service_healthy
    image: docker.io/library/cassandra:latest
    hostname: cassandra04
    container_name: cassandra04
    mem_limit: 1g
    cpus: 0.5
    restart: always
    networks:
      cassandra_network:
        ipv4_address: 192.168.100.154
    volumes:
      - ${PWD}/docker/cassandra04:/var/lib/cassandra
      - conf04:/opt/cassandra/conf
    environment:
      - CASSANDRA_CLUSTER_NAME=formation
      - CASSANDRA_SEEDS=cassandra01,cassandra02
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_DC=Terres-de-la-Couronne
      - CASSANDRA_RACK=Port-Real
      - CASSANDRA_BROADCAST_RPC_ADDRESS=192.168.100.154
      - CASSANDRA_NATIVE_TRANSPORT_PORT=9042
      - MAX_HEAP_SIZE=256m
      - HEAP_NEWSIZE=50m
      - LOCAL_JMX=no
      - JVM_EXTRA_OPTS=-Djava.rmi.server.hostname=192.168.100.154 -Dcom.sun.management.jmxremote.authenticate=false
    ports:
      - "7400:7000"
      - "9442:9042"
      - "7499:7199"
      - "8481:8081"
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'Startup complete' /var/log/cassandra/system.log"]
      interval: 15s
      timeout: 10s
      retries: 50
      start_period: 180s

# ─────────────────────────────────────────────────────────────
#  CASSANDRA EXPORTERS  (JMX → Prometheus /metrics)
#  Image : criteord/cassandra_exporter
#  Chaque sidecar se connecte en JMX à son nœud Cassandra.
#
#  Config : host + port uniquement (les deux seuls champs valides).
#  Le chemin dans le conteneur est /cassandra_exporter/config.yml
#  et l'entrypoint de l'image attend exactement ce fichier.
#
#  restart: on-failure permet les retentatives si Cassandra
#  n'est pas encore prêt à accepter des connexions JMX.
# ─────────────────────────────────────────────────────────────
  cassandra01-exporter:
    image: criteord/cassandra_exporter:2.3.8
    container_name: cassandra01-exporter
    restart: on-failure
    depends_on:
      cassandra01:
        condition: service_healthy
    networks:
      cassandra_network:
        ipv4_address: 192.168.100.161
    volumes:
      - ${PWD}/monitoring/cassandra-exporter/cassandra01.yml:/cassandra_exporter/config.yml:ro
    command: ["config.yml"]
    ports:
      - "8180:8080"

  cassandra02-exporter:
    image: criteord/cassandra_exporter:2.3.8
    container_name: cassandra02-exporter
    restart: on-failure
    depends_on:
      cassandra02:
        condition: service_healthy
    networks:
      cassandra_network:
        ipv4_address: 192.168.100.162
    volumes:
      - ${PWD}/monitoring/cassandra-exporter/cassandra02.yml:/cassandra_exporter/config.yml:ro
    command: ["config.yml"]
    ports:
      - "8280:8080"

  cassandra03-exporter:
    image: criteord/cassandra_exporter:2.3.8
    container_name: cassandra03-exporter
    restart: on-failure
    depends_on:
      cassandra03:
        condition: service_healthy
    networks:
      cassandra_network:
        ipv4_address: 192.168.100.163
    volumes:
      - ${PWD}/monitoring/cassandra-exporter/cassandra03.yml:/cassandra_exporter/config.yml:ro
    command: ["config.yml"]
    ports:
      - "8380:8080"

  cassandra04-exporter:
    image: criteord/cassandra_exporter:2.3.8
    container_name: cassandra04-exporter
    restart: on-failure
    depends_on:
      cassandra04:
        condition: service_healthy
    networks:
      cassandra_network:
        ipv4_address: 192.168.100.164
    volumes:
      - ${PWD}/monitoring/cassandra-exporter/cassandra04.yml:/cassandra_exporter/config.yml:ro
    command: ["config.yml"]
    ports:
      - "8480:8080"

# ─────────────────────────────────────────────────────────────
#  PROMETHEUS
# ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    networks:
      cassandra_network:
        ipv4_address: 192.168.100.170
    volumes:
      - ${PWD}/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

# ─────────────────────────────────────────────────────────────
#  GRAFANA
# ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    depends_on:
      - prometheus
    networks:
      cassandra_network:
        ipv4_address: 192.168.100.171
    volumes:
      - ${PWD}/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${PWD}/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"

# ─────────────────────────────────────────────────────────────
#  VOLUMES
# ─────────────────────────────────────────────────────────────
volumes:
  conf01:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/docker/cassandra01-conf
  conf02:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/docker/cassandra02-conf
  conf03:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/docker/cassandra03-conf
  conf04:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/docker/cassandra04-conf
  prometheus_data:
  grafana_data:
